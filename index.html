<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS AI | v119.5.8 PRO</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230ea5e9'/><text y='75' x='15' font-family='Arial' font-weight='900' font-size='80' fill='white'>N</text></svg>">
<style>
/* --- Spectrum UI Core: 変更厳禁 --- */
:root { --bg: #030712; --panel: rgba(17, 24, 39, 0.85); --accent: #0ea5e9; --text: #f9fafb; --muted: #9ca3af; --border: rgba(255, 255, 255, 0.1); --col-w: 320px; --red: #ef4444; }
* { box-sizing: border-box; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; background-image: radial-gradient(at 0% 0%, rgba(14, 165, 233, 0.1) 0, transparent 50%); }

/* 修正：ヘッダー完全3分割 & 中央要素配置 */
.header-bar { display: grid; grid-template-columns: var(--col-w) 1fr var(--col-w); height: 120px; border-bottom: 1px solid var(--border); backdrop-filter: blur(25px); align-items: center; z-index: 1000; position: relative; }
.ad-slot { width: var(--col-w); height: 100%; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: var(--accent); letter-spacing: 2px; font-weight: bold; border-right: 1px solid var(--border); }
.ad-slot.right { border-right: none; border-left: 1px solid var(--border); }

.nav-center-block { display: flex; justify-content: space-between; align-items: center; padding: 0 40px; height: 100%; }

/* 修正：バージョン(左端) / ブランド名と紹介文(中央・同サイズ1.8rem) / CONTACT US(右端) */
.ver-left { font-size: 0.7rem; color: var(--accent); font-weight: 900; letter-spacing: 1px; }
.brand-identity { display: flex; align-items: center; gap: 15px; cursor: pointer; }
.logo-sq { width: 38px; height: 38px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: white; box-shadow: 0 0 20px var(--accent); }
.brand-full-line { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.02em; white-space: nowrap; display: flex; align-items: center; }
.brand-sub { color: var(--text); margin-left: 12px; }
.contact-us-btn { font-size: 0.65rem; color: var(--text); border: 1px solid var(--accent); padding: 8px 22px; border-radius: 100px; font-weight: 800; cursor: pointer; background: rgba(14, 165, 233, 0.05); }

/* レイアウト */
.layout-frame { display: grid; grid-template-columns: var(--col-w) 1fr var(--col-w); height: calc(100vh - 120px); }
.col-scroll { overflow-y: auto; padding: 25px; scrollbar-width: none; }
.col-scroll::-webkit-scrollbar { display: none; }

/* カード & 編集モードUI */
.grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
.card { background: var(--panel); border: 1px solid var(--border); border-radius: 28px; padding: 25px; min-height: 350px; display: flex; flex-direction: column; position: relative; }
.edit-badge { position: absolute; top: 15px; right: 15px; background: var(--accent); color: white; font-size: 0.6rem; padding: 4px 10px; border-radius: 50px; font-weight: 900; display: none; cursor: pointer; z-index: 10; }

/* 修正：NEWニュース赤バッジ */
.new-tag { background: var(--red); color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; font-weight: 900; margin-right: 8px; vertical-align: middle; }

/* 管理者モーダル (指示通り角丸28px・透過) */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
.overlay.active { display: flex; }
.modal { background: #0f172a; border: 1px solid var(--accent); padding: 40px; border-radius: 28px; width: 850px; position: relative; box-shadow: 0 0 60px rgba(14, 165, 233, 0.2); }
.tab-btn { padding: 12px 25px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--muted); border-radius: 12px; cursor: pointer; font-weight: bold; margin-right: 10px; }
.tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
</style>
</head>
<body>

<header class="header-bar">
  <div class="ad-slot">SPONSORS WANTED</div>
  <div class="nav-center-block">
      <div class="ver-left">v119.5.8 PRO</div>
      <div class="brand-identity" id="admin-trigger">
          <div class="logo-sq">N</div>
          <div class="brand-full-line">NEXUS AI <span class="brand-sub">| The Definitive Global Directory for Generative Intelligence</span></div>
      </div>
      <div class="contact-us-btn" onclick="openOverlay('contact-modal')">CONTACT US</div>
  </div>
  <div class="ad-slot right">SPONSORS WANTED</div>
</header>

<div class="layout-frame">
  <aside class="col-scroll" style="border-right:1px solid var(--border);">
    <div id="clock-t" style="font-size:1.4rem; color:var(--accent); font-weight:bold;">00:00:00</div>
    <div id="clock-z" style="font-size:0.75rem; color:var(--muted); margin-bottom:35px;">Asia/Tokyo</div>
    <h4 style="font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:20px;">Live AI News</h4>
    <div id="news-feed"></div>
  </aside>

  <main class="col-scroll">
    <div style="text-align:center; margin-bottom:25px; font-size:0.7rem; font-weight:800; color:var(--muted); letter-spacing:2px;">TOTAL AI INDEX: <span id="tool-count" style="color:var(--accent);">0</span></div>
    <div id="main-grid" class="grid-container"></div>
  </main>

  <aside class="col-scroll" style="border-left:1px solid var(--border);">
    <h4 style="font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:20px;">New Arrivals</h4>
    <div id="arrival-feed"></div>
  </aside>
</div>

<div id="admin-modal" class="overlay">
  <div class="modal">
    <button style="position:absolute; top:20px; right:20px; background:none; border:none; color:white; font-size:2rem; cursor:pointer;" onclick="closeAll()">×</button>
    <div style="margin-bottom:30px; display:flex;">
        <button class="tab-btn active" onclick="switchTab(0)">Support Inbox</button>
        <button class="tab-btn" onclick="switchTab(1)">Data Ingester</button>
        <button class="tab-btn" onclick="switchTab(2)">Site Analytics</button>
    </div>
    <div id="admin-content" style="background:rgba(0,0,0,0.3); padding:30px; border-radius:20px; min-height:400px; border:1px solid var(--border);"></div>
  </div>
</div>

<div id="contact-modal" class="overlay">
    <div class="modal" style="width:500px;">
      <button style="position:absolute; top:20px; right:20px; background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;" onclick="closeAll()">×</button>
      <h2 style="font-weight:800; margin-bottom:25px;">Contact System</h2>
      <input type="text" id="c-name" style="width:100%; padding:15px; background:black; border:1px solid var(--border); color:white; border-radius:12px; margin-bottom:15px;" placeholder="Full Name">
      <input type="email" id="c-email" style="width:100%; padding:15px; background:black; border:1px solid var(--border); color:white; border-radius:12px; margin-bottom:15px;" placeholder="Email">
      <textarea id="c-msg" style="width:100%; height:120px; background:black; border:1px solid var(--border); color:white; border-radius:12px; padding:15px; margin-bottom:15px;" placeholder="Message"></textarea>
      <div style="text-align:center; margin-bottom:15px; font-size:0.8rem;">12 + 5 = ? <input type="number" id="c-captcha" style="width:60px; background:black; border:1px solid var(--accent); color:white; border-radius:6px; padding:5px;"></div>
      <button onclick="sendMsg()" style="width:100%; padding:20px; background:var(--accent); color:white; border:none; border-radius:15px; font-weight:bold; cursor:pointer;">SEND TO NEXUS SYNC</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyD0JXpRxLnwrtPsqfK63LHhLG4J999VfwU",
  authDomain: "nexus-ai-55d14.firebaseapp.com",
  projectId: "nexus-ai-55d14",
  storageBucket: "nexus-ai-55d14.firebasestorage.app",
  messagingSenderId: "28279756535",
  appId: "1:28279756535:web:2ae124e9fe28736a7725f2"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let allData = [];
let editMode = false;

// 修正：隠しコマンド（タイトル5連打）
let clicks = 0;
document.getElementById('admin-trigger').onclick = () => {
    clicks++;
    if(clicks >= 5) {
        const pw = prompt("ADMIN AUTHORIZATION:");
        if(pw === "55533557") {
            editMode = true;
            openOverlay('admin-modal');
            switchTab(0);
            renderMain(); // EDITボタンを表示させるため再描画
        }
        clicks = 0;
    }
};

// 修正：管理パネル・タブ機能
function switchTab(idx) {
    const cont = document.getElementById('admin-content');
    const btns = document.querySelectorAll('.tab-btn');
    btns.forEach((b, i) => b.classList.toggle('active', i === idx));

    if(idx === 0) { // Inbox
        cont.innerHTML = `<h3>Support Inbox</h3><div id="inbox-list">Loading...</div>`;
        db.collection("inquiries").orderBy("timestamp", "desc").get().then(snap => {
            document.getElementById('inbox-list').innerHTML = snap.docs.map(doc => {
                const d = doc.data();
                return `<div style="padding:15px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
                    <div><b>${d.name}</b>: ${d.msg}</div>
                    <a href="mailto:${d.email}" style="color:var(--accent); font-size:0.7rem; font-weight:bold;">REPLY</a>
                </div>`;
            }).join("");
        });
    } else if(idx === 1) { // Ingester
        cont.innerHTML = `<h3>Data Ingester</h3><textarea id="raw-j" style="width:100%; height:250px; background:#000; color:var(--accent); border:1px solid var(--border); padding:10px; font-family:monospace;"></textarea>
        <button onclick="pushSync()" style="width:100%; margin-top:20px; padding:15px; background:var(--accent); border:none; color:white; border-radius:10px; font-weight:bold; cursor:pointer;">PUSH TO GLOBAL SYNC</button>`;
    } else { // Analytics
        cont.innerHTML = `<h3>Site Analytics</h3><div style="font-size:2.5rem; font-weight:900; color:var(--accent);">${allData.length} SYSTEMS</div><div style="margin-top:20px; opacity:0.6;">GA4 Connectivity: Stable</div>`;
    }
}

// 修正：カードの描画（編集・削除機能付き）
async function renderMain() {
    const snap = await db.collection("ai_tools").get();
    allData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    document.getElementById('tool-count').innerText = allData.length;
    
    document.getElementById('main-grid').innerHTML = allData.map(it => `
        <div class="card">
            <div class="edit-badge" style="display:${editMode?'block':'none'}" onclick="editItem('${it.id}')">EDIT / DELETE</div>
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <img src="https://www.google.com/s2/favicons?sz=128&domain=${it.favicon_domain}" style="width:40px; border-radius:10px;">
                <div style="text-align:right;"><div class="stars" style="--p:${(it.rating/5)*100}%"></div><div class="rate-num">(${it.rating}/5)</div></div>
            </div>
            <div style="font-size:1.4rem; font-weight:800;">${it.name}</div>
            <div style="font-size:0.6rem; color:var(--accent); font-weight:900; margin:5px 0;">VERSION: ${it.version || '1.0.0'}</div>
            <div style="font-size:0.9rem; opacity:0.8; flex-grow:1; line-height:1.6;">${it.short_desc}</div>
            <div style="border-top:1px solid var(--border); padding-top:15px; display:flex; justify-content:space-between; font-size:0.7rem; font-weight:bold;">
                <div>Min. $${it.pricing?.[0]?.price || '0'}</div><div style="color:var(--accent)">DETAILS</div>
            </div>
        </div>
    `).join("");

    // 左カラム：NEWバッジ付きニュース
    document.getElementById('news-feed').innerHTML = allData.slice(0, 5).map(n => `
        <div style="margin-bottom:18px; font-size:0.85rem; line-height:1.5; opacity:0.7;"><span class="new-tag">NEW</span>${n.name} has synchronized with v119.5 PRO.</div>
    `).join("");

    // 右カラム：新着
    document.getElementById('arrival-feed').innerHTML = allData.slice(-8).map(a => `
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px; font-size:0.8rem; opacity:0.8;">
            <img src="https://www.google.com/s2/favicons?domain=${a.favicon_domain}" style="width:18px;">
            <span>${a.name}</span>
        </div>
    `).join("");
}

// 指示：編集・保存・削除ロジック
async function editItem(id) {
    const it = allData.find(x => x.id === id);
    const newName = prompt("Edit Name:", it.name);
    if(newName === null) return;
    if(newName === "DELETE") {
        if(confirm("Permanently delete this AI?")) await db.collection("ai_tools").doc(id).delete();
    } else {
        await db.collection("ai_tools").doc(id).update({ name: newName });
    }
    renderMain();
}

async function sendMsg() {
    if(document.getElementById('c-captcha').value !== "17") return alert("Captcha Failed");
    await db.collection("inquiries").add({
        name: document.getElementById('c-name').value,
        email: document.getElementById('c-email').value,
        msg: document.getElementById('c-msg').value,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });
    alert("Message Sent."); closeAll();
}

async function pushSync() {
    const raw = document.getElementById('raw-j').value;
    const items = JSON.parse(raw);
    const batch = db.batch();
    items.forEach(it => batch.set(db.collection("ai_tools").doc(it.id), it, {merge:true}));
    await batch.commit();
    alert("Global Sync Complete."); renderMain();
}

function openOverlay(id) { document.getElementById(id).classList.add('active'); }
function closeAll() { document.querySelectorAll('.overlay').forEach(o => o.classList.remove('active')); }

setInterval(() => {
    const n = new Date();
    document.getElementById('clock-t').innerText = n.toLocaleTimeString('en-US',{hour12:false});
    document.getElementById('clock-z').innerText = Intl.DateTimeFormat().resolvedOptions().timeZone.replace('_',' ');
}, 1000);

renderMain();
</script>
</body>
</html>
