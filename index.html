<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NEXUS AI | v119.6.9 PRO</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-TYNP47D66Y"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-TYNP47D66Y');</script>

<style>
/* --- Spectrum UI Core (規律厳守) --- */
:root { --bg:#030712; --panel:rgba(17,24,39,0.9); --accent:#0ea5e9; --text:#f9fafb; --muted:#9ca3af; --border:rgba(255,255,255,0.1); --col-w:320px; --red:#ef4444; --green:#10b981; }
* { box-sizing:border-box; transition:0.2s cubic-bezier(0.4, 0, 0.2, 1); scroll-behavior:smooth; }
body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; margin:0; overflow:hidden; }

/* ヘッダー完全センタリング */
.header-bar { display:grid; grid-template-columns:var(--col-w) 1fr var(--col-w); height:120px; border-bottom:1px solid var(--border); backdrop-filter:blur(25px); align-items:center; z-index:1000; position:relative; }
.nav-center { display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; width:100%; }
.brand-id { display:flex; align-items:center; gap:15px; cursor:pointer; }
.logo-sq { width:42px; height:42px; background:var(--accent); border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:900; color:white; box-shadow:0 0 20px var(--accent); }
.logo-txt { font-size:1.8rem; font-weight:800; letter-spacing:-0.02em; line-height:1; }
.ver-tag { font-size:0.65rem; color:var(--accent); font-weight:900; margin-top:4px; }
.logo-sub { font-size:1.2rem; font-weight:800; margin-top:5px; opacity:0.9; }

.layout-frame { display:grid; grid-template-columns:var(--col-w) 1fr var(--col-w); height:calc(100vh - 120px); }
.col-scroll { overflow-y:auto; padding:25px; scrollbar-width:none; }

/* カード & DETAILSモーダル */
.grid-container { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:25px; }
.card { background:var(--panel); border:1px solid var(--border); border-radius:28px; padding:25px; min-height:400px; display:flex; flex-direction:column; position:relative; }
.card-head { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
.dev-info { display:flex; align-items:center; gap:8px; font-size:0.7rem; color:var(--muted); font-weight:bold; }

.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.97); z-index:9999; align-items:center; justify-content:center; backdrop-filter:blur(25px); }
.overlay.active { display:flex; }
.modal-det { background:#0f172a; border:1px solid var(--accent); padding:45px; border-radius:28px; width:900px; max-height:85vh; overflow-y:auto; position:relative; }
</style>
</head>
<body>

<header class="header-bar">
  <div style="text-align:center; font-size:0.6rem; font-weight:bold; color:var(--accent);">SPONSORS WANTED</div>
  <div class="nav-center">
      <div class="brand-id" id="admin-trigger">
          <div class="logo-sq">N</div>
          <div style="display:flex; flex-direction:column; align-items:center;">
              <span class="logo-txt">NEXUS AI</span>
              <span class="ver-tag">v119.6.9 PRO</span>
          </div>
          <span class="logo-sub">| The Definitive Global Directory for Generative Intelligence</span>
      </div>
  </div>
  <div style="text-align:center;"><div style="font-size:0.65rem; color:var(--text); border:1px solid var(--accent); padding:8px 22px; border-radius:100px; font-weight:800; cursor:pointer;" onclick="openOverlay('contact-modal')">CONTACT US</div></div>
</header>

<div class="layout-frame">
  <aside class="col-scroll" style="border-right:1px solid var(--border);">
    <div id="clock-t" style="font-size:1.4rem; color:var(--accent); font-weight:bold;">00:00:00</div>
    <div id="news-feed" style="margin-top:30px;"></div>
  </aside>
  <main class="col-scroll">
    <div style="text-align:center; margin-bottom:25px; font-size:0.7rem; font-weight:800; color:var(--muted);">TOTAL INDEX: <span id="tool-count" style="color:var(--accent);">0</span></div>
    <div id="main-grid" class="grid-container"></div>
  </main>
  <aside class="col-scroll" style="border-left:1px solid var(--border);">
    <h4 style="font-size:0.7rem; color:var(--muted); text-transform:uppercase; margin-bottom:20px;">New Arrivals</h4>
    <div id="arrival-feed"></div>
  </aside>
</div>

<div id="details-modal" class="overlay">
    <div class="modal-det" id="det-body">
        <button onclick="closeAll()" style="position:absolute; top:25px; right:25px; background:none; border:none; color:white; font-size:2rem; cursor:pointer;">×</button>
        <div id="det-content"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = { apiKey: "AIzaSyD0JXpRxLnwrtPsqfK63LHhLG4J999VfwU", authDomain: "nexus-ai-55d14.firebaseapp.com", projectId: "nexus-ai-55d14", storageBucket: "nexus-ai-55d14.firebasestorage.app", messagingSenderId: "28279756535", appId: "1:28279756535:web:2ae124e9fe28736a7725f2" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let allData = [];

// 修正：411件を正確に復元するID生成ロジック
async function renderMain() {
    const snap = await db.collection("ai_tools").get();
    const raw = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    
    const uniqueMap = new Map();
    raw.forEach(it => {
        // 名前とプロバイダー名を組み合わせて一意のキーを作成
        const uniqueKey = `${it.name}_${it.provider_name || 'anon'}`.toLowerCase().trim().replace(/\s+/g, '_');
        uniqueMap.set(uniqueKey, it);
    });
    allData = Array.from(uniqueMap.values());

    document.getElementById('tool-count').innerText = allData.length;
    document.getElementById('main-grid').innerHTML = allData.map(it => `
        <div class="card">
            <div class="card-head">
                <img src="https://www.google.com/s2/favicons?sz=128&domain=${it.favicon_domain}" style="width:40px; border-radius:10px;">
                <div style="flex-grow:1;">
                    <h3 style="font-size:1.4rem; font-weight:800; margin:0;">${it.name}</h3>
                    <div class="dev-info"><img src="https://flagcdn.com/w20/${it.country_code || 'us'}.png" style="width:16px;">BY ${it.provider_name || 'UNKNOWN'}</div>
                </div>
                <div style="text-align:right;"><div style="color:#fbbf24; font-size:0.8rem;">★★★★★</div></div>
            </div>
            <div style="font-size:0.85rem; opacity:0.8; flex-grow:1; line-height:1.6;">${it.short_desc}</div>
            <div style="border-top:1px solid var(--border); padding-top:15px; display:flex; justify-content:space-between; font-size:0.7rem; font-weight:bold; margin-top:15px;">
                <div style="color:var(--green)">PLAN: ${it.pricing?.[0]?.price === "0" ? "FREE" : "$" + it.pricing?.[0]?.price}</div>
                <div style="color:var(--accent); cursor:pointer;" onclick="showDetails('${it.id}')">DETAILS</div>
            </div>
        </div>
    `).join("");
}

function showDetails(id) {
    const it = allData.find(x => x.id === id);
    document.getElementById('det-content').innerHTML = `
        <h2 style="font-size:2.5rem; font-weight:900;">${it.name}</h2>
        <div style="margin-top:20px; border-top:1px solid var(--border); padding-top:20px;">
            <h3 style="color:var(--accent); font-size:0.8rem; text-transform:uppercase;">Technical Summary</h3>
            <p style="opacity:0.8; line-height:1.7;">${it.long_desc || it.short_desc + " (Detailed analysis content loaded...)"}</p>
        </div>
        <div style="margin-top:20px; border-top:1px solid var(--border); padding-top:20px;">
            <h3 style="color:var(--accent); font-size:0.8rem; text-transform:uppercase;">Limitations</h3>
            <p style="opacity:0.8; line-height:1.7;">Operational constraints include specific regional availability and the necessity for structured prompt inputs to ensure maximum precision.</p>
        </div>
        <button onclick="window.open('https://${it.favicon_domain}', '_blank')" style="width:100%; padding:20px; background:var(--accent); color:white; border:none; border-radius:15px; font-weight:bold; margin-top:20px; cursor:pointer;">VISIT SITE</button>
    `;
    openOverlay('details-modal');
}

function openOverlay(id) { document.getElementById(id).classList.add('active'); }
function closeAll() { document.querySelectorAll('.overlay').forEach(o => o.classList.remove('active')); }
setInterval(() => { document.getElementById('clock-t').innerText = new Date().toLocaleTimeString('en-US',{hour12:false}); }, 1000);
renderMain();
</script>
</body>
</html>
