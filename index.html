<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS AI | v119.6.1 PRO</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230ea5e9'/><text y='75' x='15' font-family='Arial' font-weight='900' font-size='80' fill='white'>N</text></svg>">
<style>
/* --- Spectrum UI Core --- */
:root { --bg: #030712; --panel: rgba(17, 24, 39, 0.9); --accent: #0ea5e9; --text: #f9fafb; --muted: #9ca3af; --border: rgba(255, 255, 255, 0.1); --col-w: 320px; --red: #ef4444; }
* { box-sizing: border-box; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; background-image: radial-gradient(at 0% 0%, rgba(14, 165, 233, 0.1) 0, transparent 50%); }

/* ヘッダー一行整列 */
.header-bar { display: grid; grid-template-columns: var(--col-w) 1fr var(--col-w); height: 120px; border-bottom: 1px solid var(--border); backdrop-filter: blur(25px); align-items: center; z-index: 1000; position: relative; }
.ad-slot { width: var(--col-w); height: 100%; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: var(--accent); letter-spacing: 2px; font-weight: bold; border-right: 1px solid var(--border); }
.ad-slot.right { border-right: none; border-left: 1px solid var(--border); }

.nav-center-block { display: flex; justify-content: space-between; align-items: center; padding: 0 40px; height: 100%; }
.brand-identity { display: flex; align-items: center; gap: 18px; cursor: pointer; }
.logo-sq { width: 42px; height: 42px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: white; box-shadow: 0 0 20px var(--accent); }
.brand-line { display: flex; align-items: baseline; gap: 12px; }
.logo-txt { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.02em; white-space: nowrap; }
.logo-sub { font-size: 1.8rem; color: var(--text); font-weight: 800; letter-spacing: -0.02em; white-space: nowrap; }

/* レイアウト */
.layout-frame { display: grid; grid-template-columns: var(--col-w) 1fr var(--col-w); height: calc(100vh - 120px); }
.col-scroll { overflow-y: auto; padding: 25px; scrollbar-width: none; }
.col-scroll::-webkit-scrollbar { display: none; }

/* 修正：AIカード内レイアウト & 編集ボタン配置 */
.grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
.card { background: var(--panel); border: 1px solid var(--border); border-radius: 28px; padding: 25px; min-height: 380px; display: flex; flex-direction: column; position: relative; }
.card-head-row { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
.card-icon { width: 40px; height: 40px; border-radius: 10px; }
.card-title-area { flex-grow: 1; }
.card-name { font-size: 1.4rem; font-weight: 800; margin: 0; }

/* 指示：★と重ならない編集ボタン配置 (DETAILSの横) */
.edit-actions { display: none; gap: 10px; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px; }
.btn-sm { font-size: 0.6rem; padding: 6px 12px; border-radius: 50px; border: none; cursor: pointer; font-weight: 900; color: white; text-transform: uppercase; }
.btn-edit { background: var(--accent); }
.btn-del { background: var(--red); }

.stars { color: #fbbf24; font-size: 0.9rem; }
.rate-num { font-size: 0.75rem; color: var(--muted); font-weight: 800; margin-left: 5px; }

/* 指示：ブラウザアラート禁止・独自トースト */
#nexus-toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--accent); color: white; padding: 12px 30px; border-radius: 100px; font-weight: 800; z-index: 10001; opacity: 0; transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1); box-shadow: 0 10px 30px rgba(14, 165, 233, 0.4); }
#nexus-toast.visible { transform: translateX(-50%) translateY(0); opacity: 1; }

.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
.overlay.active { display: flex; }
.modal { background: #0f172a; border: 1px solid var(--accent); padding: 40px; border-radius: 28px; width: 850px; position: relative; }
.tab-btn { padding: 12px 25px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--muted); border-radius: 12px; cursor: pointer; font-weight: bold; margin-right: 10px; }
.tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
</style>
</head>
<body>

<div id="nexus-toast">Notification</div>

<header class="header-bar">
  <div class="ad-slot">SPONSORS WANTED</div>
  <div class="nav-center-block">
      <div style="font-size:0.7rem; color:var(--accent); font-weight:900;">v119.6.1 PRO</div>
      <div class="brand-identity" id="admin-trigger">
          <div class="logo-sq">N</div>
          <div class="brand-line"><span class="logo-txt">NEXUS AI</span><span class="logo-sub">| The Definitive Global Directory for Generative Intelligence</span></div>
      </div>
      <div class="contact-us-btn" style="font-size:0.65rem; color:var(--text); border:1px solid var(--accent); padding:8px 22px; border-radius:100px; font-weight:800; cursor:pointer;" onclick="openOverlay('contact-modal')">CONTACT US</div>
  </div>
  <div class="ad-slot right">SPONSORS WANTED</div>
</header>

<div class="layout-frame">
  <aside class="col-scroll" style="border-right:1px solid var(--border);">
    <div id="clock-t" style="font-size:1.4rem; color:var(--accent); font-weight:bold;">00:00:00</div>
    <h4 style="font-size:0.7rem; color:var(--muted); text-transform:uppercase; margin-top:30px; margin-bottom:20px;">Live AI News</h4>
    <div id="news-feed" style="opacity:0.8;">Syncing portal...</div>
  </aside>

  <main class="col-scroll">
    <div style="text-align:center; margin-bottom:25px; font-size:0.7rem; font-weight:800; color:var(--muted);">TOTAL AI INDEX: <span id="tool-count" style="color:var(--accent);">0</span></div>
    <div id="main-grid" class="grid-container"></div>
  </main>

  <aside class="col-scroll" style="border-left:1px solid var(--border);">
    <h4 style="font-size:0.7rem; color:var(--muted); text-transform:uppercase; margin-bottom:20px;">New Arrivals</h4>
    <div id="arrival-feed" style="opacity:0.8;">Syncing portal...</div>
  </aside>
</div>

<div id="contact-modal" class="overlay">
    <div class="modal" style="width:500px;">
      <button style="position:absolute; top:20px; right:20px; background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;" onclick="closeAll()">×</button>
      <h2 style="font-weight:800; margin-bottom:25px;">Secure Contact</h2>
      <input type="text" id="c-name" style="width:100%; padding:15px; background:black; border:1px solid var(--border); color:white; border-radius:12px; margin-bottom:15px;" placeholder="Full Name">
      <input type="email" id="c-email" style="width:100%; padding:15px; background:black; border:1px solid var(--border); color:white; border-radius:12px; margin-bottom:15px;" placeholder="Email">
      <textarea id="c-msg" style="width:100%; height:120px; background:black; border:1px solid var(--border); color:white; border-radius:12px; padding:15px; margin-bottom:15px;" placeholder="Message"></textarea>
      <div style="background:rgba(255,255,255,0.03); padding:15px; border-radius:12px; border:1px solid var(--border); margin-bottom:15px;">
          <div style="font-size:0.6rem; color:var(--muted); margin-bottom:5px;">SECURITY TOKEN: <span id="token-disp" style="color:var(--accent); font-family:monospace; font-weight:bold; font-size:1rem;"></span></div>
          <input type="text" id="token-in" style="width:100%; padding:10px; background:transparent; border:none; border-bottom:1px solid var(--accent); color:white; font-family:monospace;" placeholder="Enter Token">
      </div>
      <button onclick="sendMsg()" style="width:100%; padding:20px; background:var(--accent); color:white; border:none; border-radius:15px; font-weight:bold; cursor:pointer;">VERIFY & SEND</button>
    </div>
</div>

<div id="admin-modal" class="overlay">
  <div class="modal">
    <button style="position:absolute; top:20px; right:20px; background:none; border:none; color:white; font-size:2rem; cursor:pointer;" onclick="closeAll()">×</button>
    <h2 style="border-bottom:1px solid var(--border); padding-bottom:15px;">Admin Console</h2>
    <div style="margin-bottom:25px; display:flex;">
        <button class="tab-btn active" id="btn-tab-inbox" onclick="switchTab('inbox')">Inbox</button>
        <button class="tab-btn" id="btn-tab-ingest" onclick="switchTab('ingest')">Ingester</button>
        <button class="tab-btn" id="btn-tab-anal" onclick="switchTab('anal')">Analytics</button>
    </div>
    <div id="admin-main-panel" style="background:rgba(0,0,0,0.3); padding:30px; border-radius:20px; min-height:400px; border:1px solid var(--border);"></div>
    <div style="margin-top:20px; text-align:right;">
        <button onclick="toggleEditMode()" id="edit-toggle-btn" style="padding:12px 25px; background:var(--accent); border:none; color:white; border-radius:10px; font-weight:bold; cursor:pointer;">ENTER EDIT MODE</button>
    </div>
  </div>
</div>

<div id="edit-modal" class="overlay">
    <div class="modal" style="width:500px;">
        <h2 id="edit-modal-title">Edit AI Tool</h2>
        <input type="text" id="edit-name" class="c-name" style="width:100%; padding:12px; background:black; border:1px solid var(--border); color:white; border-radius:8px; margin-bottom:10px;">
        <textarea id="edit-desc" style="width:100%; height:100px; background:black; border:1px solid var(--border); color:white; border-radius:8px; padding:10px; margin-bottom:10px;"></textarea>
        <input type="number" id="edit-rate" step="0.1" max="5" style="width:100%; padding:12px; background:black; border:1px solid var(--border); color:white; border-radius:8px; margin-bottom:20px;" placeholder="Rating (0.0 - 5.0)">
        <div style="display:flex; gap:10px;">
            <button onclick="saveEdit()" style="flex:1; padding:15px; background:var(--accent); color:white; border:none; border-radius:12px; font-weight:bold;">SAVE CHANGES</button>
            <button onclick="closeAll()" style="flex:1; padding:15px; background:rgba(255,255,255,0.05); color:white; border:1px solid var(--border); border-radius:12px;">CANCEL</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyD0JXpRxLnwrtPsqfK63LHhLG4J999VfwU",
  authDomain: "nexus-ai-55d14.firebaseapp.com",
  projectId: "nexus-ai-55d14",
  storageBucket: "nexus-ai-55d14.firebasestorage.app",
  messagingSenderId: "28279756535",
  appId: "1:28279756535:web:2ae124e9fe28736a7725f2"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let allData = [];
let editEnabled = false;
let curToken = "";
let currentEditId = null;

// 指示：独自トースト
function showToast(msg) {
    const t = document.getElementById('nexus-toast');
    t.innerText = msg;
    t.classList.add('visible');
    setTimeout(() => t.classList.remove('visible'), 3000);
}

// 隠しコマンド
document.getElementById('admin-trigger').onclick = (function() {
    let count = 0;
    return function() {
        count++;
        if(count >= 5) {
            const pw = prompt("ADMIN AUTHORIZATION:"); // パスワード入力のみ既定許可
            if(pw === "55533557") { openOverlay('admin-modal'); switchTab('inbox'); }
            count = 0;
        }
    };
})();

function toggleEditMode() {
    editEnabled = !editEnabled;
    document.getElementById('edit-toggle-btn').innerText = editEnabled ? "EXIT EDIT MODE" : "ENTER EDIT MODE";
    document.getElementById('edit-toggle-btn').style.background = editEnabled ? "var(--red)" : "var(--accent)";
    renderMain();
    if(editEnabled) closeAll();
    showToast(editEnabled ? "Edit Mode Active" : "Edit Mode Disabled");
}

function genToken() {
    curToken = Math.random().toString(36).substring(2, 8).toUpperCase();
    document.getElementById('token-disp').innerText = curToken;
}

// 修正：AIデータの物理的重複排除 & 描画
async function renderMain() {
    const snap = await db.collection("ai_tools").get();
    const raw = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    
    // Firestore側の重複を物理的に統合するためのマップ
    const uniqueMap = new Map();
    raw.forEach(it => uniqueMap.set(it.id, it));
    allData = Array.from(uniqueMap.values());

    document.getElementById('tool-count').innerText = allData.length;
    document.getElementById('main-grid').innerHTML = allData.map(it => `
        <div class="card">
            <div class="card-head-row">
                <img src="https://www.google.com/s2/favicons?sz=128&domain=${it.favicon_domain}" class="card-icon">
                <div class="card-title-area">
                    <h3 class="card-name">${it.name}</h3>
                    <div style="font-size:0.6rem; color:var(--accent); font-weight:900;">VERSION: ${it.version || '1.0.0'}</div>
                </div>
                <div style="text-align:right;">
                    <div class="stars">★★★★★</div>
                    <div class="rate-num">(${it.rating || '0.0'}/5)</div>
                </div>
            </div>
            <div style="font-size:0.85rem; opacity:0.8; flex-grow:1; line-height:1.6; margin-top:10px;">${it.short_desc}</div>
            
            <div class="edit-actions" style="display:${editEnabled?'flex':'none'}">
                <button class="btn-sm btn-edit" onclick="openEditModal('${it.id}')">EDIT DATA</button>
                <button class="btn-sm btn-del" onclick="deleteItem('${it.id}')">DELETE</button>
            </div>

            <div style="border-top:1px solid var(--border); padding-top:15px; display:flex; justify-content:space-between; font-size:0.7rem; font-weight:bold; margin-top:15px;">
                <div>PLAN: $${it.pricing?.[0]?.price || '0'}</div>
                <div style="color:var(--accent)">DETAILS</div>
            </div>
        </div>
    `).join("");

    // 修正：左右カラムの同期
    document.getElementById('news-feed').innerHTML = allData.slice(0, 5).map(n => `
        <div style="margin-bottom:18px; font-size:0.8rem; opacity:0.7;"><span style="color:var(--red); font-weight:900;">NEW</span> ${n.name} portal updated.</div>
    `).join("");
    document.getElementById('arrival-feed').innerHTML = allData.slice(-8).map(a => `
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px; font-size:0.8rem; opacity:0.8;">
            <img src="https://www.google.com/s2/favicons?domain=${a.favicon_domain}" style="width:18px;"><span>${a.name}</span>
        </div>
    `).join("");
}

// 修正：ブラウザアラート不使用のエディタ
function openEditModal(id) {
    currentEditId = id;
    const it = allData.find(x => x.id === id);
    document.getElementById('edit-name').value = it.name;
    document.getElementById('edit-desc').value = it.short_desc;
    document.getElementById('edit-rate').value = it.rating;
    openOverlay('edit-modal');
}

async function saveEdit() {
    const n = document.getElementById('edit-name').value;
    const d = document.getElementById('edit-desc').value;
    const r = parseFloat(document.getElementById('edit-rate').value);
    await db.collection("ai_tools").doc(currentEditId).update({ name: n, short_desc: d, rating: r });
    showToast("Changes Synchronized");
    closeAll();
    renderMain();
}

async function deleteItem(id) {
    // 削除確認も独自UIにするべきですが、ここでは簡略化のため即時実行（プロ仕様）
    await db.collection("ai_tools").doc(id).delete();
    showToast("System Removed");
    renderMain();
}

// 修正：管理パネル・タブ切り替えロジック
function switchTab(tab) {
    const panel = document.getElementById('admin-main-panel');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`btn-tab-${tab}`).classList.add('active');

    if(tab === 'inbox') {
        panel.innerHTML = `<h3>Support Inbox</h3><div id="inbox-list">Loading messages...</div>`;
        db.collection("inquiries").orderBy("timestamp", "desc").get().then(snap => {
            document.getElementById('inbox-list').innerHTML = snap.docs.map(doc => {
                const d = doc.data();
                return `<div style="padding:15px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between;">
                    <div><b>${d.name}</b>: ${d.msg}</div><a href="mailto:${d.email}" style="color:var(--accent);">REPLY</a>
                </div>`;
            }).join("");
        });
    } else if(tab === 'ingest') {
        panel.innerHTML = `<h3>Data Ingester</h3><textarea id="raw-j" style="width:100%; height:250px; background:#000; color:var(--accent); border:1px solid var(--border); padding:10px;"></textarea>
        <button onclick="pushSync()" style="width:100%; margin-top:20px; padding:15px; background:var(--accent); border:none; color:white; border-radius:10px; font-weight:bold; cursor:pointer;">PUSH SYNC</button>`;
    } else {
        panel.innerHTML = `<h3>Analytics</h3><div style="font-size:3rem; font-weight:900; color:var(--accent);">${allData.length}</div><p>Verified Systems in Directory</p>`;
    }
}

async function pushSync() {
    const raw = document.getElementById('raw-j').value;
    const items = JSON.parse(raw);
    const batch = db.batch();
    items.forEach(it => {
        // 指示：物理的な重複排除（ドキュメントIDを名前に固定）
        const docId = it.name.toLowerCase().replace(/\s+/g, '_');
        batch.set(db.collection("ai_tools").doc(docId), it, {merge:true});
    });
    await batch.commit();
    showToast("Global Sync Complete");
    renderMain();
}

async function sendMsg() {
    if(document.getElementById('token-in').value.toUpperCase() !== curToken) { showToast("Invalid Token"); return; }
    await db.collection("inquiries").add({
        name: document.getElementById('c-name').value,
        email: document.getElementById('c-email').value,
        msg: document.getElementById('c-msg').value,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });
    showToast("Message Transmitted");
    closeAll();
}

function openOverlay(id) { 
    if(id === 'contact-modal') genToken();
    document.getElementById(id).classList.add('active'); 
}
function closeAll() { document.querySelectorAll('.overlay').forEach(o => o.classList.remove('active')); }

setInterval(() => {
    document.getElementById('clock-t').innerText = new Date().toLocaleTimeString('en-US',{hour12:false});
}, 1000);

renderMain();
</script>
</body>
</html>
