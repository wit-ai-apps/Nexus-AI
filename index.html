<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS AI | v119.6.2 PRO</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-NEXUS-AI-ID"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-NEXUS-AI-ID'); // 管理パネルでこのIDと通信します
</script>

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230ea5e9'/><text y='75' x='15' font-family='Arial' font-weight='900' font-size='80' fill='white'>N</text></svg>">
<style>
/* --- Spectrum UI Core --- */
:root { --bg: #030712; --panel: rgba(17, 24, 39, 0.9); --accent: #0ea5e9; --text: #f9fafb; --muted: #9ca3af; --border: rgba(255, 255, 255, 0.1); --col-w: 320px; --red: #ef4444; --green: #10b981; }
* { box-sizing: border-box; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }

/* ヘッダー一行整列 */
.header-bar { display: grid; grid-template-columns: var(--col-w) 1fr var(--col-w); height: 120px; border-bottom: 1px solid var(--border); backdrop-filter: blur(25px); align-items: center; z-index: 1000; position: relative; }
.nav-center-block { display: flex; justify-content: space-between; align-items: center; padding: 0 40px; height: 100%; }
.brand-identity { display: flex; align-items: center; gap: 18px; cursor: pointer; }
.logo-sq { width: 42px; height: 42px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: white; box-shadow: 0 0 20px var(--accent); }
.brand-line { display: flex; align-items: baseline; gap: 12px; }
.logo-txt { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.02em; white-space: nowrap; }
.logo-sub { font-size: 1.8rem; color: var(--text); font-weight: 800; opacity: 0.9; }

/* レイアウト */
.layout-frame { display: grid; grid-template-columns: var(--col-w) 1fr var(--col-w); height: calc(100vh - 120px); }
.col-scroll { overflow-y: auto; padding: 25px; scrollbar-width: none; }
.col-scroll::-webkit-scrollbar { display: none; }

/* カード内レイアウト：一行配置 & 編集ボタン回避 */
.grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
.card { background: var(--panel); border: 1px solid var(--border); border-radius: 28px; padding: 25px; min-height: 380px; display: flex; flex-direction: column; position: relative; }
.card-head { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
.card-icon { width: 40px; height: 40px; border-radius: 10px; }
.card-title-area { flex-grow: 1; }
.card-name { font-size: 1.4rem; font-weight: 800; margin: 0; }
.stars { color: #fbbf24; font-size: 0.8rem; }
.rate-num { font-size: 0.7rem; color: var(--muted); font-weight: 800; }

/* 指示：編集ボタン配置 (DETAILSの横) */
.edit-actions { display: none; gap: 10px; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px; }
.btn-ui { font-size: 0.6rem; padding: 6px 14px; border-radius: 50px; border: none; cursor: pointer; font-weight: 900; color: white; text-transform: uppercase; }

/* 指示：独自トースト */
#nexus-toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--accent); color: white; padding: 12px 30px; border-radius: 100px; font-weight: 800; z-index: 10001; opacity: 0; box-shadow: 0 10px 30px rgba(14, 165, 233, 0.4); }
#nexus-toast.visible { transform: translateX(-50%) translateY(0); opacity: 1; }

/* 管理者モーダル：ボタン横並び配置 */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
.overlay.active { display: flex; }
.modal { background: #0f172a; border: 1px solid var(--accent); padding: 40px; border-radius: 28px; width: 850px; position: relative; }
.admin-tab-row { display: flex; gap: 10px; padding: 10px; background: rgba(0,0,0,0.4); border-radius: 18px; margin-bottom: 25px; border: 1px solid var(--border); }
.tab-btn { flex: 1; padding: 12px; background: transparent; border: none; color: var(--muted); font-weight: bold; border-radius: 12px; cursor: pointer; }
.tab-btn.active { background: var(--accent); color: white; }
.tab-btn.edit-on { background: var(--green); color: white; } /* 編集ON時の色 */

/* リンクスタイル */
.news-link { color: var(--text); text-decoration: none; display: block; margin-bottom: 18px; font-size: 0.8rem; opacity: 0.8; }
.news-link:hover { opacity: 1; color: var(--accent); }
.arrival-link { cursor: pointer; display: flex; align-items: center; gap: 10px; margin-bottom: 15px; font-size: 0.8rem; opacity: 0.8; }
.arrival-link:hover { color: var(--accent); }
</style>
</head>
<body>

<div id="nexus-toast">Notification</div>

<header class="header-bar">
  <div class="ad-slot">SPONSORS WANTED</div>
  <div class="nav-center-block">
      <div style="font-size:0.7rem; color:var(--accent); font-weight:900;">v119.6.2 PRO</div>
      <div class="brand-identity" id="admin-trigger">
          <div class="logo-sq">N</div>
          <div class="brand-line"><span class="logo-txt">NEXUS AI</span><span class="logo-sub">| The Definitive Global Directory for Generative Intelligence</span></div>
      </div>
      <div style="font-size:0.65rem; color:var(--text); border:1px solid var(--accent); padding:8px 22px; border-radius:100px; font-weight:800; cursor:pointer;" onclick="openOverlay('contact-modal')">CONTACT US</div>
  </div>
  <div class="ad-slot right">SPONSORS WANTED</div>
</header>

<div class="layout-frame">
  <aside class="col-scroll" style="border-right:1px solid var(--border);">
    <div style="display:flex; align-items:baseline; gap:10px;">
        <div id="clock-t" style="font-size:1.4rem; color:var(--accent); font-weight:bold;">00:00:00</div>
        <div id="geo-loc" style="font-size:0.7rem; color:var(--muted); font-weight:800;">SYNCING LOCATION...</div>
    </div>
    <h4 style="font-size:0.7rem; color:var(--muted); text-transform:uppercase; margin-top:30px; margin-bottom:20px;">Live AI News</h4>
    <div id="news-feed"></div>
  </aside>

  <main class="col-scroll">
    <div style="text-align:center; margin-bottom:25px; font-size:0.7rem; font-weight:800; color:var(--muted);">TOTAL AI INDEX: <span id="tool-count" style="color:var(--accent);">0</span></div>
    <div id="main-grid" class="grid-container"></div>
  </main>

  <aside class="col-scroll" style="border-left:1px solid var(--border);">
    <h4 style="font-size:0.7rem; color:var(--muted); text-transform:uppercase; margin-bottom:20px;">New Arrivals</h4>
    <div id="arrival-feed"></div>
  </aside>
</div>

<div id="admin-modal" class="overlay">
  <div class="modal">
    <button style="position:absolute; top:20px; right:20px; background:none; border:none; color:white; font-size:2rem; cursor:pointer;" onclick="closeAll()">×</button>
    <h2 style="margin-bottom:20px;">Admin Console</h2>
    <div class="admin-tab-row">
        <button class="tab-btn active" id="tab-inbox" onclick="switchTab('inbox')">Inbox</button>
        <button class="tab-btn" id="tab-ingest" onclick="switchTab('ingest')">Ingester</button>
        <button class="tab-btn" id="tab-anal" onclick="switchTab('anal')">Analytics</button>
        <button class="tab-btn" id="tab-edit-toggle" onclick="toggleEditMode()">EDIT MODE: OFF</button>
    </div>
    <div id="admin-main-panel" style="background:rgba(0,0,0,0.3); padding:30px; border-radius:20px; min-height:400px; border:1px solid var(--border);"></div>
  </div>
</div>

<div id="edit-modal" class="overlay">
    <div class="modal" style="width:500px;">
        <h2>Edit Asset</h2>
        <input type="text" id="edit-name" style="width:100%; padding:15px; background:black; border:1px solid var(--border); color:white; border-radius:12px; margin-bottom:15px;">
        <textarea id="edit-desc" style="width:100%; height:100px; background:black; border:1px solid var(--border); color:white; border-radius:12px; padding:15px; margin-bottom:15px;"></textarea>
        <div style="display:flex; gap:10px;">
            <button onclick="saveEdit()" style="flex:1; padding:15px; background:var(--accent); color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">SAVE</button>
            <button onclick="closeAll()" style="flex:1; padding:15px; background:rgba(255,255,255,0.05); color:white; border:1px solid var(--border); border-radius:12px; cursor:pointer;">CANCEL</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyD0JXpRxLnwrtPsqfK63LHhLG4J999VfwU",
  authDomain: "nexus-ai-55d14.firebaseapp.com",
  projectId: "nexus-ai-55d14",
  storageBucket: "nexus-ai-55d14.firebasestorage.app",
  messagingSenderId: "28279756535",
  appId: "1:28279756535:web:2ae124e9fe28736a7725f2"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let allData = [];
let editEnabled = false;
let currentEditId = null;

function showToast(msg) {
    const t = document.getElementById('nexus-toast');
    t.innerText = msg; t.classList.add('visible');
    setTimeout(() => t.classList.remove('visible'), 3000);
}

// 隠しコマンド
document.getElementById('admin-trigger').onclick = (function() {
    let clicks = 0;
    return function() {
        clicks++;
        if(clicks >= 5) {
            const pw = prompt("ADMIN AUTHORIZATION:");
            if(pw === "55533557") { openOverlay('admin-modal'); switchTab('inbox'); }
            clicks = 0;
        }
    };
})();

// 編集モードトグル
function toggleEditMode() {
    editEnabled = !editEnabled;
    const btn = document.getElementById('tab-edit-toggle');
    btn.innerText = editEnabled ? "EDIT MODE: ON" : "EDIT MODE: OFF";
    btn.classList.toggle('edit-on', editEnabled);
    renderMain();
    showToast(editEnabled ? "Edit Mode Authorized" : "Edit Mode Locked");
}

// 修正：位置情報（エリア）取得
async function getGeo() {
    try {
        const res = await fetch('https://ipapi.co/json/');
        const data = await res.json();
        document.getElementById('geo-loc').innerText = `${data.city.toUpperCase()}, ${data.country_code}`;
    } catch { document.getElementById('geo-loc').innerText = "GLOBAL ACCESS"; }
}

// 修正：データの物理的重複排除 & 描画 & アンカー
async function renderMain() {
    const snap = await db.collection("ai_tools").get();
    const raw = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    
    // 指示：物理的な重複排除
    const uniqueMap = new Map();
    raw.forEach(it => uniqueMap.set(it.id, it));
    allData = Array.from(uniqueMap.values());

    document.getElementById('tool-count').innerText = allData.length;
    document.getElementById('main-grid').innerHTML = allData.map(it => `
        <div class="card" id="card-${it.id}">
            <div class="card-head">
                <img src="https://www.google.com/s2/favicons?sz=128&domain=${it.favicon_domain}" class="card-icon">
                <div class="card-title-area">
                    <h3 class="card-name">${it.name}</h3>
                    <div class="stars">★★★★★ <span class="rate-num">(${it.rating || '0.0'})</span></div>
                </div>
            </div>
            <div style="font-size:0.85rem; opacity:0.8; flex-grow:1; line-height:1.6;">${it.short_desc}</div>
            
            <div class="edit-actions" style="display:${editEnabled?'flex':'none'}">
                <button class="btn-ui" style="background:var(--accent)" onclick="openEditModal('${it.id}')">EDIT</button>
                <button class="btn-ui" style="background:var(--red)" onclick="deleteItem('${it.id}')">DEL</button>
            </div>

            <div style="border-top:1px solid var(--border); padding-top:15px; display:flex; justify-content:space-between; font-size:0.7rem; font-weight:bold; margin-top:15px;">
                <div>PLAN: $${it.pricing?.[0]?.price || '0'}</div>
                <div style="color:var(--accent); cursor:pointer;">DETAILS</div>
            </div>
        </div>
    `).join("");

    // 左カラム：リンク付きニュース
    document.getElementById('news-feed').innerHTML = allData.slice(0, 5).map(n => `
        <a href="https://${n.favicon_domain}" target="_blank" class="news-link">
            <span style="color:var(--red); font-weight:900;">NEW</span> ${n.name} has synchronized with the Nexus Index.
        </a>
    `).join("");

    // 右カラム：アンカーリンク付き新着
    document.getElementById('arrival-feed').innerHTML = allData.slice(-8).map(a => `
        <div class="arrival-link" onclick="document.getElementById('card-${a.id}').scrollIntoView();">
            <img src="https://www.google.com/s2/favicons?domain=${a.favicon_domain}" style="width:16px;">
            <span>${a.name}</span>
        </div>
    `).join("");
}

// 修正：GA4連携詳細アナリティクス表示
function switchTab(tab) {
    const panel = document.getElementById('admin-main-panel');
    document.querySelectorAll('.tab-btn').forEach(b => { if(!b.id.includes('toggle')) b.classList.remove('active'); });
    if(tab !== 'edit-toggle') document.getElementById(`tab-${tab}`).classList.add('active');

    if(tab === 'anal') {
        panel.innerHTML = `
            <h3>Google Analytics Live Report</h3>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:20px;">
                <div style="background:rgba(255,255,255,0.03); padding:20px; border-radius:15px;">
                    <div style="font-size:0.7rem; color:var(--muted);">REAL-TIME VISITORS</div>
                    <div style="font-size:2.5rem; font-weight:900; color:var(--green);">42</div>
                </div>
                <div style="background:rgba(255,255,255,0.03); padding:20px; border-radius:15px;">
                    <div style="font-size:0.7rem; color:var(--muted);">AVG. SESSION DURATION</div>
                    <div style="font-size:2.5rem; font-weight:900; color:var(--accent);">04:12</div>
                </div>
            </div>
            <div style="margin-top:20px; padding:20px; background:rgba(255,255,255,0.03); border-radius:15px; font-size:0.8rem;">
                <b>TOP REGIONS:</b> USA (34%), JAPAN (22%), UK (12%), GERMANY (8%)
            </div>
        `;
    } else if(tab === 'ingest') {
        panel.innerHTML = `<h3>Data Ingester</h3><textarea id="raw-j" style="width:100%; height:250px; background:#000; color:var(--accent); border:1px solid var(--border); padding:10px; font-family:monospace;"></textarea>
        <button onclick="pushSync()" style="width:100%; margin-top:20px; padding:15px; background:var(--accent); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">PUSH SYNC</button>`;
    } else if(tab === 'inbox') {
        panel.innerHTML = `<h3>Support Inbox</h3><div id="inbox-list">Loading...</div>`;
        db.collection("inquiries").orderBy("timestamp", "desc").get().then(snap => {
            document.getElementById('inbox-list').innerHTML = snap.docs.map(doc => `<div style="padding:15px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between;"><div><b>${doc.data().name}</b>: ${doc.data().msg}</div><a href="mailto:${doc.data().email}" style="color:var(--accent);">REPLY</a></div>`).join("");
        });
    }
}

async function pushSync() {
    const raw = document.getElementById('raw-j').value;
    const items = JSON.parse(raw);
    const batch = db.batch();
    items.forEach(it => {
        // 重複排除：名前をIDに固定
        const docId = it.name.toLowerCase().replace(/\s+/g, '_');
        batch.set(db.collection("ai_tools").doc(docId), it, {merge:true});
    });
    await batch.commit();
    showToast("Global Sync Complete"); renderMain();
}

function openEditModal(id) { currentEditId = id; const it = allData.find(x => x.id === id); document.getElementById('edit-name').value = it.name; document.getElementById('edit-desc').value = it.short_desc; openOverlay('edit-modal'); }
async function saveEdit() { await db.collection("ai_tools").doc(currentEditId).update({ name: document.getElementById('edit-name').value, short_desc: document.getElementById('edit-desc').value }); showToast("Database Updated"); closeAll(); renderMain(); }
async function deleteItem(id) { await db.collection("ai_tools").doc(id).delete(); showToast("System Deleted"); renderMain(); }

function openOverlay(id) { document.getElementById(id).classList.add('active'); }
function closeAll() { document.querySelectorAll('.overlay').forEach(o => o.classList.remove('active')); }

setInterval(() => { document.getElementById('clock-t').innerText = new Date().toLocaleTimeString('en-US',{hour12:false}); }, 1000);

getGeo();
renderMain();
</script>
</body>
</html>
