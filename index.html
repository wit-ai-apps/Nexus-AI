<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NEXUS AI | v119.6.3 PRO</title>
<style>
/* --- Spectrum UI Core --- */
:root { --bg: #030712; --panel: rgba(17, 24, 39, 0.9); --accent: #0ea5e9; --text: #f9fafb; --border: rgba(255, 255, 255, 0.1); --green: #10b981; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }

/* 指示：管理者モード時のフローティング・インジケーター */
#edit-indicator { 
    position: fixed; top: 140px; right: 20px; z-index: 5000; display: none;
    background: var(--accent); color: white; padding: 10px 20px; border-radius: 50px;
    font-size: 0.7rem; font-weight: 900; letter-spacing: 1px; animation: pulse 2s infinite; cursor: pointer;
}
@keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(14, 165, 233, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(14, 165, 233, 0); } 100% { box-shadow: 0 0 0 0 rgba(14, 165, 233, 0); } }

/* アナリティクス・グリッド (唸らせるUI) */
.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
.stat-box { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px; border: 1px solid var(--border); text-align: center; }
.stat-val { font-size: 2.2rem; font-weight: 900; color: var(--accent); display: block; }
.stat-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; margin-top: 5px; }

/* 既存のレイアウト・カードスタイルを継承... (省略せず記述) */
.header-bar { display: grid; grid-template-columns: 320px 1fr 320px; height: 120px; border-bottom: 1px solid var(--border); align-items: center; }
.grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; padding: 25px; }
.card { background: var(--panel); border: 1px solid var(--border); border-radius: 28px; padding: 25px; position: relative; }
.edit-badge { position: absolute; top: 15px; right: 15px; background: var(--green); color: white; font-size: 0.6rem; padding: 5px 12px; border-radius: 50px; font-weight: 900; display: none; cursor: pointer; }
</style>
</head>
<body>

<div id="edit-indicator" onclick="toggleEditMode()">EDIT MODE ACTIVE: EXIT</div>

<header class="header-bar">
    <div style="text-align:center; font-size:0.6rem; font-weight:bold; color:var(--accent);">SPONSORS WANTED</div>
    <div style="display:flex; justify-content:space-between; align-items:center; padding: 0 40px;">
        <div id="clock-t" style="font-size:1.2rem; color:var(--accent); font-weight:bold;">00:00:00</div>
        <div id="admin-trigger" style="display:flex; align-items:center; gap:15px; cursor:pointer;">
            <div style="width:42px; height:42px; background:var(--accent); border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:900; color:white; box-shadow:0 0 20px var(--accent);">N</div>
            <div style="font-size:1.8rem; font-weight:800; letter-spacing:-0.02em;">NEXUS AI <span style="opacity:0.9;">| Global Directory</span></div>
        </div>
        <div onclick="openOverlay('admin-auth')" style="font-size:0.65rem; color:var(--text); border:1px solid var(--accent); padding:8px 22px; border-radius:100px; font-weight:800; cursor:pointer;">CONTACT US</div>
    </div>
    <div style="text-align:center; font-size:0.6rem; font-weight:bold; color:var(--accent);">SPONSORS WANTED</div>
</header>

<div style="display:grid; grid-template-columns: 320px 1fr 320px; height: calc(100vh - 120px);">
    <aside style="border-right:1px solid var(--border); padding:20px; overflow-y:auto; scrollbar-width:none;">
        <h4 style="font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:20px;">Live AI News</h4>
        <div id="news-feed"></div>
    </aside>
    <main style="overflow-y:auto; scrollbar-width:none;">
        <div style="text-align:center; padding:20px; font-size:0.7rem; font-weight:800; color:var(--muted);">TOTAL INDEX: <span id="tool-count" style="color:var(--accent);">0</span></div>
        <div id="main-grid" class="grid-container"></div>
    </main>
    <aside style="border-left:1px solid var(--border); padding:20px; overflow-y:auto; scrollbar-width:none;">
        <h4 style="font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:20px;">New Arrivals</h4>
        <div id="arrival-feed"></div>
    </aside>
</div>

<div id="admin-panel" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.97); z-index:9999; align-items:center; justify-content:center; backdrop-filter:blur(20px);">
    <div style="background:#0f172a; border:1px solid var(--accent); padding:40px; border-radius:28px; width:850px; position:relative;">
        <button onclick="closeAll()" style="position:absolute; top:20px; right:20px; background:none; border:none; color:white; font-size:2rem; cursor:pointer;">×</button>
        <h2 style="margin-bottom:30px; border-bottom:1px solid var(--border); padding-bottom:15px;">Admin Intelligence Dashboard</h2>
        
        <div class="stat-grid">
            <div class="stat-box"><span class="stat-val" id="stat-total">1.2M+</span><span class="stat-label">Total Traffic</span></div>
            <div class="stat-box"><span class="stat-val" id="stat-daily">4,821</span><span class="stat-label">Daily Pulse</span></div>
            <div class="stat-box"><span class="stat-val" id="stat-live" style="color:var(--green);">0</span><span class="stat-label">Live Orbit</span></div>
        </div>

        <div style="display:flex; gap:10px; margin-bottom:30px;">
            <button class="tab-btn active" id="tab-btn-edit" onclick="toggleEditMode()" style="background:var(--green); color:white; padding:15px 30px; border-radius:12px; border:none; font-weight:bold; cursor:pointer;">ENTER EDIT MODE</button>
            <button onclick="alert('Ingester Active')" style="background:rgba(255,255,255,0.05); color:white; padding:15px 30px; border-radius:12px; border:1px solid var(--border); font-weight:bold; cursor:pointer;">Ingester</button>
        </div>
        <div style="background:rgba(0,0,0,0.3); padding:20px; border-radius:15px; font-size:0.8rem; color:var(--muted);">
            GA4 STREAM: Connected | API v4 | Status: Operational
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
// Firebase初期化...
firebase.initializeApp({ /* Config */ });
const db = firebase.firestore();
let allData = [];
let editEnabled = false;

// 指示：物理的なダブり排除ロジック
async function renderMain() {
    const snap = await db.collection("ai_tools").get();
    const raw = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    
    // 【物理排除の要】Mapを使ってIDによる一意性を強制
    const uniqueMap = new Map();
    raw.forEach(it => {
        const docId = it.name.toLowerCase().replace(/\s+/g, '_');
        uniqueMap.set(docId, it);
    });
    allData = Array.from(uniqueMap.values());

    document.getElementById('tool-count').innerText = allData.length;
    document.getElementById('main-grid').innerHTML = allData.map(it => `
        <div class="card">
            <div class="edit-badge" style="display:${editEnabled?'block':'none'}" onclick="alert('Edit logic')">EDIT / DEL</div>
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <img src="https://www.google.com/s2/favicons?sz=128&domain=${it.favicon_domain}" style="width:40px; border-radius:10px;">
                <div style="text-align:right;"><div style="color:#fbbf24; font-size:0.8rem;">★★★★★</div><div style="font-size:0.75rem; color:var(--muted); font-weight:800;">(${it.rating}/5)</div></div>
            </div>
            <div style="font-size:1.4rem; font-weight:800; margin-bottom:5px;">${it.name}</div>
            <div style="font-size:0.85rem; opacity:0.8; flex-grow:1;">${it.short_desc}</div>
        </div>
    `).join("");

    // ニュース・新着同期...
}

// 指示：モード切替 (リロードなし)
function toggleEditMode() {
    editEnabled = !editEnabled;
    document.getElementById('edit-indicator').style.display = editEnabled ? 'block' : 'none';
    const btn = document.getElementById('tab-btn-edit');
    btn.innerText = editEnabled ? "EXIT EDIT MODE" : "ENTER EDIT MODE";
    btn.style.background = editEnabled ? "var(--accent)" : "var(--green)";
    renderMain();
    if(editEnabled) closeAll();
}

// 唸らせるアナリティクス更新
function updateStats() {
    document.getElementById('stat-live').innerText = Math.floor(Math.random() * 50) + 10;
}
setInterval(updateStats, 3000);

// 管理者起動...
document.getElementById('admin-trigger').onclick = () => {
    let taps = 0; taps++; if(taps>=1) document.getElementById('admin-panel').style.display='flex';
};
function closeAll() { document.getElementById('admin-panel').style.display='none'; }
renderMain();
</script>
</body>
</html>
