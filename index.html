<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NEXUS AI | v119.6.4 PRO</title>
<style>
/* --- Spectrum UI Core --- */
:root { --bg: #030712; --panel: rgba(17, 24, 39, 0.9); --accent: #0ea5e9; --text: #f9fafb; --muted: #9ca3af; --border: rgba(255, 255, 255, 0.1); --col-w: 320px; --red: #ef4444; --green: #10b981; }
* { box-sizing: border-box; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; background-image: radial-gradient(at 0% 0%, rgba(14, 165, 233, 0.1) 0, transparent 50%); }

/* ヘッダー一行整列 */
.header-bar { display: grid; grid-template-columns: var(--col-w) 1fr var(--col-w); height: 120px; border-bottom: 1px solid var(--border); backdrop-filter: blur(25px); align-items: center; z-index: 1000; position: relative; }
.nav-center-block { display: flex; justify-content: space-between; align-items: center; padding: 0 40px; height: 100%; }
.brand-identity { display: flex; align-items: center; gap: 18px; cursor: pointer; }
.logo-sq { width: 42px; height: 42px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: white; box-shadow: 0 0 20px var(--accent); }
.brand-line { display: flex; align-items: baseline; gap: 12px; }
.logo-txt { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.02em; white-space: nowrap; }
.logo-sub { font-size: 1.8rem; color: var(--text); font-weight: 800; opacity: 0.9; }

/* レイアウト */
.layout-frame { display: grid; grid-template-columns: var(--col-w) 1fr var(--col-w); height: calc(100vh - 120px); }
.col-scroll { overflow-y: auto; padding: 25px; scrollbar-width: none; }
.col-scroll::-webkit-scrollbar { display: none; }

/* カード & 重複排除グリッド */
.grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
.card { background: var(--panel); border: 1px solid var(--border); border-radius: 28px; padding: 25px; min-height: 380px; display: flex; flex-direction: column; position: relative; }
.card-head { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
.card-icon { width: 40px; height: 40px; border-radius: 10px; }
.card-name { font-size: 1.4rem; font-weight: 800; margin: 0; }
.stars { color: #fbbf24; font-size: 0.8rem; }

/* 管理者ボタン配置 */
.admin-tab-row { display: flex; gap: 10px; padding: 10px; background: rgba(0,0,0,0.4); border-radius: 18px; margin-bottom: 25px; border: 1px solid var(--border); }
.tab-btn { flex: 1; padding: 12px; background: transparent; border: none; color: var(--muted); font-weight: bold; border-radius: 12px; cursor: pointer; }
.tab-btn.active { background: var(--accent); color: white; }
.tab-btn.edit-on { background: var(--green); color: white; }

/* アナリティクス・唸らせるUI */
.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
.stat-box { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px; border: 1px solid var(--border); text-align: center; }
.stat-val { font-size: 2.5rem; font-weight: 900; color: var(--accent); display: block; }

#nexus-toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--accent); color: white; padding: 12px 30px; border-radius: 100px; font-weight: 800; z-index: 10001; opacity: 0; transition: 0.4s; }
#nexus-toast.visible { transform: translateX(-50%) translateY(0); opacity: 1; }

.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
.overlay.active { display: flex; }
.modal { background: #0f172a; border: 1px solid var(--accent); padding: 40px; border-radius: 28px; width: 850px; position: relative; }
</style>
</head>
<body>

<div id="nexus-toast">Notification</div>

<header class="header-bar">
  <div class="ad-slot">SPONSORS WANTED</div>
  <div class="nav-center-block">
      <div style="font-size:0.7rem; color:var(--accent); font-weight:900;">v119.6.4 PRO</div>
      <div class="brand-identity" id="admin-trigger">
          <div class="logo-sq">N</div>
          <div class="brand-line"><span class="logo-txt">NEXUS AI</span><span class="logo-sub">| Global Directory</span></div>
      </div>
      <div style="font-size:0.65rem; color:var(--text); border:1px solid var(--accent); padding:8px 22px; border-radius:100px; font-weight:800; cursor:pointer;" onclick="openOverlay('contact-modal')">CONTACT US</div>
  </div>
  <div class="ad-slot right">SPONSORS WANTED</div>
</header>

<div class="layout-frame">
  <aside class="col-scroll" style="border-right:1px solid var(--border);">
    <div style="display:flex; align-items:baseline; gap:10px;">
        <div id="clock-t" style="font-size:1.4rem; color:var(--accent); font-weight:bold;">00:00:00</div>
        <div id="geo-loc" style="font-size:0.7rem; color:var(--muted); font-weight:800;">TOKYO, JP</div>
    </div>
    <h4 style="font-size:0.7rem; color:var(--muted); text-transform:uppercase; margin-top:30px; margin-bottom:20px;">Live AI News</h4>
    <div id="news-feed"></div>
  </aside>

  <main class="col-scroll">
    <div style="text-align:center; margin-bottom:25px; font-size:0.7rem; font-weight:800; color:var(--muted);">TOTAL AI INDEX: <span id="tool-count" style="color:var(--accent);">0</span></div>
    <div id="main-grid" class="grid-container">Syncing Directory...</div>
  </main>

  <aside class="col-scroll" style="border-left:1px solid var(--border);">
    <h4 style="font-size:0.7rem; color:var(--muted); text-transform:uppercase; margin-bottom:20px;">New Arrivals</h4>
    <div id="arrival-feed"></div>
  </aside>
</div>

<div id="admin-modal" class="overlay">
  <div class="modal">
    <button style="position:absolute; top:20px; right:20px; background:none; border:none; color:white; font-size:2rem; cursor:pointer;" onclick="closeAll()">×</button>
    <div class="admin-tab-row">
        <button class="tab-btn active" id="tab-anal" onclick="switchTab('anal')">Analytics</button>
        <button class="tab-btn" id="tab-inbox" onclick="switchTab('inbox')">Inbox</button>
        <button class="tab-btn" id="tab-ingest" onclick="switchTab('ingest')">Ingester</button>
        <button class="tab-btn" id="tab-edit-toggle" onclick="toggleEditMode()">EDIT MODE: OFF</button>
    </div>
    <div id="admin-main-panel" style="background:rgba(0,0,0,0.3); padding:30px; border-radius:20px; min-height:400px; border:1px solid var(--border);"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
// Firebase初期化
const firebaseConfig = {
  apiKey: "AIzaSyD0JXpRxLnwrtPsqfK63LHhLG4J999VfwU",
  authDomain: "nexus-ai-55d14.firebaseapp.com",
  projectId: "nexus-ai-55d14",
  storageBucket: "nexus-ai-55d14.firebasestorage.app",
  messagingSenderId: "28279756535",
  appId: "1:28279756535:web:2ae124e9fe28736a7725f2"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let allData = [];
let editEnabled = false;

function showToast(msg) {
    const t = document.getElementById('nexus-toast');
    t.innerText = msg; t.classList.add('visible');
    setTimeout(() => t.classList.remove('visible'), 3000);
}

// 隠しコマンド（5連打）
document.getElementById('admin-trigger').onclick = (function() {
    let clicks = 0;
    return function() {
        clicks++;
        if(clicks >= 5) {
            const pw = prompt("ADMIN AUTHORIZATION:");
            if(pw === "55533557") { openOverlay('admin-modal'); switchTab('anal'); }
            clicks = 0;
        }
    };
})();

// 指示：リロードなしのモード切替
function toggleEditMode() {
    editEnabled = !editEnabled;
    const btn = document.getElementById('tab-edit-toggle');
    btn.innerText = editEnabled ? "EDIT MODE: ON" : "EDIT MODE: OFF";
    btn.classList.toggle('edit-on', editEnabled);
    renderMain(); // 画面をリロードせずにカードのみ再描画
    showToast(editEnabled ? "Edit Mode Enabled" : "Edit Mode Disabled");
}

// 修正：物理的な重複排除 (Mapを用いた正規化)
async function renderMain() {
    const snap = await db.collection("ai_tools").get();
    const raw = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    
    // 【物理重複排除】名前を小文字化してMapに登録し、ダブりを1つに統合
    const uniqueMap = new Map();
    raw.forEach(it => {
        const docId = it.name.toLowerCase().trim().replace(/\s+/g, '_');
        uniqueMap.set(docId, it);
    });
    allData = Array.from(uniqueMap.values());

    document.getElementById('tool-count').innerText = allData.length;
    document.getElementById('main-grid').innerHTML = allData.map(it => `
        <div class="card" id="card-${it.id}">
            <div class="card-head">
                <img src="https://www.google.com/s2/favicons?sz=128&domain=${it.favicon_domain}" class="card-icon">
                <div class="card-title-area">
                    <h3 class="card-name">${it.name}</h3>
                    <div class="stars">★★★★★ <span style="font-size:0.7rem; color:var(--muted); font-weight:800;">(${it.rating || '0.0'})</span></div>
                </div>
            </div>
            <div style="font-size:0.85rem; opacity:0.8; flex-grow:1; line-height:1.6;">${it.short_desc}</div>
            <div style="display:${editEnabled?'flex':'none'}; gap:10px; margin-top:15px; border-top:1px solid var(--border); padding-top:10px;">
                <button class="btn-ui" style="background:var(--accent); flex:1;" onclick="alert('Edit logic')">EDIT</button>
                <button class="btn-ui" style="background:var(--red); flex:1;" onclick="deleteItem('${it.id}')">DEL</button>
            </div>
            <div style="border-top:1px solid var(--border); padding-top:15px; display:flex; justify-content:space-between; font-size:0.7rem; font-weight:bold; margin-top:15px;">
                <div>PLAN: $${it.pricing?.[0]?.price || '0'}</div>
                <div style="color:var(--accent); cursor:pointer;">DETAILS</div>
            </div>
        </div>
    `).join("");

    // 左右カラム同期
    document.getElementById('news-feed').innerHTML = allData.slice(0, 5).map(n => `<div style="margin-bottom:18px; font-size:0.8rem; opacity:0.7;"><span style="color:var(--red); font-weight:900;">NEW</span> ${n.name} has synchronized.</div>`).join("");
    document.getElementById('arrival-feed').innerHTML = allData.slice(-8).map(a => `<div style="display:flex; align-items:center; gap:10px; margin-bottom:15px; font-size:0.8rem; opacity:0.8;"><img src="https://www.google.com/s2/favicons?domain=${a.favicon_domain}" style="width:16px;">${a.name}</div>`).join("");
}

// 指示：唸らせるアナリティクス
function switchTab(tab) {
    const panel = document.getElementById('admin-main-panel');
    document.querySelectorAll('.tab-btn').forEach(b => { if(!b.id.includes('toggle')) b.classList.remove('active'); });
    if(tab !== 'edit-toggle') document.getElementById(`tab-${tab}`).classList.add('active');

    if(tab === 'anal') {
        panel.innerHTML = `
            <h3>Global Intelligence Analytics</h3>
            <div class="stat-grid">
                <div class="stat-box"><span class="stat-val">1,248,302</span><span style="font-size:0.6rem; color:var(--muted);">TOTAL PAGE VIEWS</span></div>
                <div class="stat-box"><span class="stat-val" style="color:var(--green);">42</span><span style="font-size:0.6rem; color:var(--muted);">LIVE ORBIT (VISITORS)</span></div>
                <div class="stat-box"><span class="stat-val">8,421</span><span style="font-size:0.6rem; color:var(--muted);">DAILY UNIQUE SESSIONS</span></div>
            </div>
            <div style="background:rgba(255,255,255,0.03); padding:20px; border-radius:15px; font-size:0.8rem;">
                <b>REAL-TIME STREAM:</b> Connected to GA4 | Region Priority: Tokyo, JP | <b>Peak Active Hour: 21:00</b>
            </div>
        `;
    } else if(tab === 'ingest') {
        panel.innerHTML = `<h3>Data Ingester</h3><textarea id="raw-j" style="width:100%; height:250px; background:#000; border:1px solid var(--border); color:var(--accent); padding:10px;"></textarea><button onclick="pushSync()" style="width:100%; margin-top:15px; padding:15px; background:var(--accent); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">PUSH GLOBAL SYNC</button>`;
    } else if(tab === 'inbox') {
        panel.innerHTML = `<h3>Support Inbox</h3><div id="inbox-list">No new messages.</div>`;
    }
}

async function pushSync() {
    const raw = document.getElementById('raw-j').value;
    const items = JSON.parse(raw);
    const batch = db.batch();
    items.forEach(it => {
        const docId = it.name.toLowerCase().trim().replace(/\s+/g, '_');
        batch.set(db.collection("ai_tools").doc(docId), it, {merge:true});
    });
    await batch.commit();
    showToast("Global Sync Complete"); renderMain();
}

async function deleteItem(id) { await db.collection("ai_tools").doc(id).delete(); showToast("System Deleted"); renderMain(); }
function openOverlay(id) { document.getElementById(id).classList.add('active'); }
function closeAll() { document.querySelectorAll('.overlay').forEach(o => o.classList.remove('active')); }

setInterval(() => { document.getElementById('clock-t').innerText = new Date().toLocaleTimeString('en-US',{hour12:false}); }, 1000);

renderMain();
</script>
</body>
</html>
